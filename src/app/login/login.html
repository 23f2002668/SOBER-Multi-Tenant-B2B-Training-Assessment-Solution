<app-header></app-header>

<div class="min-h-screen w-full flex items-center justify-center px-4
            bg-gradient-to-br from-pink-500 via-purple-500 to-indigo-600">

    <!-- Card -->
    <div class="relative w-full max-w-sm sm:max-w-md lg:max-w-lg
                rounded-3xl p-8 sm:p-10
                bg-gradient-to-br from-white/30 to-white/10
                backdrop-blur-2xl
                border-2 border-white
                shadow-[0_20px_50px_rgba(0,0,0,0.3)]">

        <!-- Glow blobs -->
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-pink-400 rounded-full blur-3xl opacity-60"></div>
        <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-indigo-400 rounded-full blur-3xl opacity-60"></div>

        <!-- Title -->
        <h1 class="relative text-4xl font-extrabold text-center
                   bg-gradient-to-r from-yellow-300 via-pink-300 to-cyan-300
                   bg-clip-text text-transparent">
            Login Here
        </h1>

        <p class="relative text-center text-white/80 mt-2">
            Enter your credentials to continue
        </p>

        <!-- Form -->
        <form (ngSubmit)="login()" class="relative mt-8 space-y-5">

            <!-- Type -->
            <select [(ngModel)]="usertype" name="usertype"
                    class="w-full h-12 px-5 rounded-8xl
                           bg-white/90 text-gray-800 placeholder-gray-500
                           border border-transparent
                           focus:outline-none focus:ring-4 focus:ring-indigo-400/60
                           focus:border-indigo-400
                           transition-all duration-200">
              <option name="Admin">Admin</option>
              <option name="CompanyAdmin">Company Admin</option>
              <option name="Employee">Employee</option>
            </select>

            @if (usertype) {
                <!-- Username -->
                <input type="text" [(ngModel)]="username" name="username" [placeholder]="getPlaceholder()"
                    class="w-full h-12 px-5 rounded-xl
                           bg-white/90 text-gray-800 placeholder-gray-500
                           border border-transparent
                           focus:outline-none focus:ring-4 focus:ring-pink-400/60
                           focus:border-pink-400
                           transition-all duration-200">

                <!-- Password -->
                <input type="password" [(ngModel)]="password" name="password" placeholder="Password"
                    class="w-full h-12 px-5 rounded-xl
                           bg-white/90 text-gray-800 placeholder-gray-500
                           border border-transparent
                           focus:outline-none focus:ring-4 focus:ring-indigo-400/60
                           focus:border-indigo-400
                           transition-all duration-200">

                <!-- Button -->
                <button
                    class="w-full h-12 rounded-xl text-lg font-bold text-white
                           bg-gradient-to-r from-yellow-400 via-pink-500 to-purple-600
                           hover:scale-105 active:scale-95
                           transition-all duration-700
                           border-2 border-white
                           shadow-[0_10px_30px_rgba(255,105,180,0.6)]" style="cursor: pointer;">
                    Login
                </button>

                <!-- Links -->
                <div class="relative mt-6 flex flex-col items-center text-sm">
                  <a href="#" class="text-white/80 hover:text-yellow-300 transition text-lg">
                    Forgot Password?
                  </a>
                </div>
            }
        </form>
    </div>
</div>
