<app-header></app-header>

<div class="min-h-screen w-full flex items-start justify-center bg-gradient-to-br from-pink-500 via-purple-500 to-indigo-600 p-6 relative">

  <!-- Signup Card -->
  <div class="w-full max-w-4xl bg-white rounded-3xl shadow-xl border-2 border border-white overflow-hidden mt-22 mb-10">

    <!-- Header -->
    <div class="bg-gradient-to-r from-purple-600 via-pink-500 to-rose-500 text-white p-8 text-center">
      <h1 class="text-3xl sm:text-4xl font-bold mb-2">Create Your Account</h1>
      <p class="text-lg text-purple-100">Join our learning community today!</p>
      
    </div>

    <!-- Form Content -->
    <div class="p-8 sm:p-10">

      <form class="space-y-6">

        <!-- Two-column grid for inputs -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <!-- Full Name -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
            <input type="text" placeholder="Enter Your Name" required="required"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>

          <!-- Father's Name -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Father's Name</label>
            <input type="text" placeholder="Enter Your Name" required="required"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>

          <!-- Aadhaar -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Aadhaar No. / VID</label>
            <input type="text" placeholder="Enter Your Name" required="required"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" placeholder="Enter Your Email" required="required"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>

          <!-- Phone -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number with Country Code</label>
            <input type="tel" placeholder="+1 1234567890" required="required"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>

          <!-- Date of Birth -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Date of Birth</label>
            <input type="date" required="required" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>

          <!-- Gender -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Gender</label>
            <select required="required" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition">
              <option value="">Select Gender</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>

          <!-- Institution -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">University / Institution</label>
            <input type="text" placeholder="University / Institution" required="required"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>

          <!-- Level of Education -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Current / Highest Level of Education</label>
            <select required="required" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition">
              <option value="">Select Level</option>
              <option>Intermediate or Equivalent (Must completed)</option>
              <option>Undergraduate</option>
              <option>Postgraduate</option>
              <option>Postgraduate Diploma</option>
              <option>Research / Doctorate</option>
            </select>
          </div>

          <!-- Course or Stream -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Course</label>
            <input type="text" placeholder="B. Tech, B.S., B.Sc, MBA, M. Tech, etc." required="required"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>

          <!-- Learning Goal -->
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Learning Goal</label>
            <textarea rows="3" placeholder="What do you want to achieve?" required="required"
                      class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"></textarea>
          </div>

          <!-- Country -->

          <!-- State -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">State</label>
            <input type="text" placeholder="State / Province" required="required"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>

          <!-- Photo -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Upload Photograph (Format: jpg, jpeg, png) <br> (Max. Size: 200kb)</label>
            <input type="file" required="required"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>

          <!-- Signature -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Upload Signature (Format: jpg, jpeg, png) <br> (Max. Size: 200kb)</label>
            <input type="file" required="required"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input name="password" type="password" [(ngModel)]="password" placeholder="Create a password" required="required"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
            <input name="confirmPassword" type="password" [(ngModel)]="confirmPassword" placeholder="Confirm password" required="required"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
            
            <p *ngIf="passwordMismatch" style="color: red;"> Pasword & Confirm Password are different </p>
          </div>

        </div>

        <!-- Password Requirements -->
                <div class="mt-6 p-4 bg-gradient-to-r from-emerald-50 to-green-50 
                            rounded-xl border border-emerald-100">
                    <p class="text-sm font-medium text-gray-700 mb-2">Password Requirements:</p>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                        <div class="flex items-center">
                            <div class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></div>
                            <span class="text-xs text-gray-600">8+ characters</span>
                        </div>
                        <div class="flex items-center">
                            <div class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></div>
                            <span class="text-xs text-gray-600">1 uppercase</span>
                        </div>
                        <div class="flex items-center">
                            <div class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></div>
                            <span class="text-xs text-gray-600">1 number</span>
                        </div>
                        <div class="flex items-center">
                            <div class="w-2 h-2 rounded-full bg-emerald-500 mr-2"></div>
                            <span class="text-xs text-gray-600">1 symbol</span>
                        </div>
                    </div>
                </div>

        <!-- Terms -->
        <div class="flex items-start gap-2 text-gray-600 text-sm mt-2">
          <input type="checkbox" class="mt-1">
          <span>I agree to the <a routerLink="/terms-conditions" target="_blank" class="text-purple-600 hover:underline">Terms & Conditions</a></span>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 mt-6">
          <button type="submit"
                  (click) = "verifyPassword()"
                  class="flex-1 py-3 bg-purple-600 text-white rounded-xl font-semibold 
                         hover:bg-purple-700 transition">
            Create Account
          </button>
          <button type="reset"
                  class="flex-1 py-3 border border-purple-300 rounded-xl text-purple-600 
                         hover:bg-purple-50 transition">
            Clear Form
          </button>
        </div>

        <!-- Login Link -->
        <p class="text-center text-gray-600 mt-4">
          Already have an account?
          <a routerLink="/login" class="text-purple-600 font-semibold hover:underline">Sign In</a>
        </p>
