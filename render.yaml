services:
  - type: web
    name: sober-b2b-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: static
    name: sober-b2b-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist/business-operations-automation-system